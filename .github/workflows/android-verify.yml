name: Android Verify

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve Android SDK
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          printf 'sdk.dir=%s\n' "$SDK_ROOT" > local.properties

      - name: Make scripts executable
        run: chmod +x gradlew scripts/build-release.sh scripts/ci/*.sh

      - name: Unit tests and debug build
        run: ./gradlew --no-daemon testDebugUnitTest assembleDebug compileDebugAndroidTestKotlin

      - name: Upload JVM reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-verify-unit-build-reports
          path: |
            app/build/reports/**
            app/build/test-results/**
          if-no-files-found: warn

  ota-smoke-api26:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve Android SDK
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          printf 'sdk.dir=%s\n' "$SDK_ROOT" > local.properties

      - name: Make scripts executable
        run: chmod +x gradlew scripts/build-release.sh scripts/ci/*.sh

      - name: Enable KVM access
        run: |
          if [[ -e /dev/kvm ]]; then
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm
          fi

      - name: OTA smoke test on Android API 26 emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 26
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: ./gradlew --no-daemon connectedDebugAndroidTest

      - name: Upload connected test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-verify-ota-api26-reports
          path: |
            app/build/reports/androidTests/**
            app/build/outputs/androidTest-results/**
            app/build/reports/**
          if-no-files-found: warn
